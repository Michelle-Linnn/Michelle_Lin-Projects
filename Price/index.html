<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账单看板 · 林文杰</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2127;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #7c6ff7;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --blue: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,111,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #7c6ff7 0%, #a78bfa 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 17px; font-weight: 500; letter-spacing: -0.3px; }
  .logo-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text);
    transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  input[type=file] { display: none; }

  /* ── ACCOUNT PILLS ── */
  .pills { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .pill {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--muted);
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent2); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── METRICS ── */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .metric:hover { border-color: var(--border2); }
  .metric-label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .metric-val { font-size: 24px; font-weight: 500; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
  .metric-val.pos { color: var(--green); }
  .metric-val.neg { color: var(--red); }
  .metric-val.neu { color: var(--text); }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .metric-glow {
    position: absolute; top: -20px; right: -20px;
    width: 80px; height: 80px; border-radius: 50%;
    opacity: 0.08; filter: blur(20px);
  }

  /* ── MAIN LAYOUT ── */
  .main { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }

  /* ── PANELS ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
    overflow: hidden;
  }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .panel-title { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── ADD FORM ── */
  .add-form { margin-bottom: 16px; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
  .field {
    padding: 7px 10px; border-radius: 8px; font-size: 13px;
    border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text);
    outline: none; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  .field:focus { border-color: var(--accent); }
  .field.f-date { width: 130px; }
  .field.f-acc { width: 130px; }
  .field.f-desc { flex: 1; min-width: 120px; }
  .field.f-amt { width: 110px; font-family: 'DM Mono', monospace; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

  /* ── TAGS ── */
  .tags-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag {
    padding: 3px 10px; border-radius: 12px; font-size: 11px;
    border: 1px solid var(--border2); background: var(--surface2);
    color: var(--muted); cursor: pointer; transition: all 0.12s;
  }
  .tag:hover, .tag.sel { background: rgba(124,111,247,0.2); border-color: var(--accent); color: var(--accent2); }
  .tag.transfer { border-color: rgba(251,191,36,0.3); }
  .tag.transfer.sel { background: rgba(251,191,36,0.15); border-color: var(--amber); color: var(--amber); }

  /* ── TABLE ── */
  .tbl-wrap { overflow-y: auto; max-height: 380px; }
  .tbl-wrap::-webkit-scrollbar { width: 4px; }
  .tbl-wrap::-webkit-scrollbar-track { background: transparent; }
  .tbl-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  table { width: 100%; border-collapse: separate; border-spacing: 0 3px; }
  thead th {
    font-size: 10px; color: var(--muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 0 8px 8px; text-align: left; position: sticky; top: 0;
    background: var(--surface); z-index: 1;
  }
  thead th:last-child { text-align: right; }

  .trow td {
    padding: 8px; font-size: 12.5px;
    background: var(--surface2);
  }
  .trow:hover td { background: rgba(124,111,247,0.08); cursor: pointer; }
  .trow td:first-child { border-radius: 8px 0 0 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; white-space: nowrap; }
  .trow td:last-child { border-radius: 0 8px 8px 0; text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; white-space: nowrap; }
  .trow.xfer td { opacity: 0.35; }

  .cat-chip {
    display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 10px;
    background: rgba(124,111,247,0.15); color: var(--accent2);
  }

  /* ── SIDE ── */
  .side { display: flex; flex-direction: column; gap: 14px; }

  .acct-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .acct-item:last-child { border: none; }
  .acct-name { font-size: 12px; color: var(--muted); }
  .acct-bal { font-size: 14px; font-weight: 500; font-family: 'DM Mono', monospace; }

  .chart-wrap { position: relative; width: 100%; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-sq { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .save-badge {
    font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace;
    padding: 4px 8px; background: var(--surface2); border-radius: 6px;
    border: 1px solid var(--border);
  }

  @media (max-width: 900px) {
    .metrics { grid-template-columns: repeat(2,1fr); }
    .main { grid-template-columns: 1fr; }
  }
  @media (max-width: 500px) {
    .metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<div class="wrap">

  <!-- HEADER -->

  </div>

  <!-- PILLS -->
  <div class="pills" id="pills">

    <div class="pill" onclick="setAcc('1218',this)">Savings 1218</div>
    <div class="pill" onclick="setAcc('7808',this)">Credit 7808</div>
  </div>

  <!-- METRICS -->
  <div class="metrics" id="metrics"></div>

  <!-- MAIN -->
  <div class="main">
    <div>
      <!-- ADD FORM -->
      <div class="panel add-form" style="margin-bottom:14px;">
        <div class="panel-head"><span class="panel-title">记一笔</span></div>
        <div class="form-row">
          <input class="field f-date" type="date" id="nDate">
          <select class="field f-acc" id="nAcc">
            <option value="1221">Checking 1221</option>
            <option value="1218">Savings 1218</option>
            <option value="7808">Credit 7808</option>
          </select>
          <input class="field f-desc" type="text" id="nDesc" placeholder="交易描述">
          <input class="field f-amt" type="number" id="nAmt" placeholder="金额 (负=支出)" step="0.01">
          <button class="btn btn-primary" onclick="addTx()">+ 添加</button>
        </div>
        <div class="tags-row" id="tagList"></div>
        <div style="display:flex;gap:8px;margin-top:8px;align-items:center;">
          <input class="field" id="newTagInput" placeholder="新建分类..." style="width:130px;font-size:12px;" onkeydown="if(event.key==='Enter')addTag()">
          <button class="btn" onclick="addTag()" style="font-size:12px;">+ 新建</button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title" id="tblTitle">交易记录</span>
          <span style="font-size:11px;color:var(--muted);">点击行删除</span>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>日期</th><th>账户</th><th>描述</th><th>分类</th><th>金额</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SIDE -->
    <div class="side">
      <div class="panel">
        <div class="panel-title" style="margin-bottom:12px;">账户余额</div>
        <div style="font-size:28px;font-weight:500;font-family:'DM Mono',monospace;letter-spacing:-1.5px;margin-bottom:14px;" id="netBal">—</div>
        <div id="acctBals"></div>
      </div>

      <div class="panel">
        <div class="panel-title" style="margin-bottom:12px;">月度真实消费</div>
        <div class="chart-wrap" style="height:170px;">
          <canvas id="barChart" role="img" aria-label="月度真实消费柱状图">月度支出趋势。</canvas>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title" style="margin-bottom:10px;">消费类别占比</div>
        <div class="legend" id="pieLegend"></div>
        <div class="chart-wrap" style="height:160px;">
          <canvas id="pieChart" role="img" aria-label="消费分类饼图">各分类支出占比。</canvas>
        </div>
      </div>
    </div>
  </div>
</div>

const KEY = 'lwj_v3';
const XFER = '内部互转';
const COLORS = ['#7c6ff7','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#a3e635','#fb923c','#22d3ee','#818cf8'];

let data = (() => { try { const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; } catch(e){return null;} })() || JSON.parse(JSON.stringify(SEED));
let tags = [...new Set(data.map(x=>x.n).filter(Boolean))];
if (!tags.includes(XFER)) tags.push(XFER);
let selTag = '';
let acc = 'all';
let barChart, pieChart;

function save() { try { localStorage.setItem(KEY, JSON.stringify(data)); document.getElementById('saveStatus').textContent = '已保存 ' + new Date().toLocaleTimeString(); } catch(e){} }

function fmt(v) {
  const s = Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (v>=0?'+':'-')+'$'+s;
}

function setAcc(a, el) {
  acc = a;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filtered() { return acc==='all' ? data : data.filter(x=>x.a===acc); }
function realSpend() { return (acc==='all'?data:data.filter(x=>x.a===acc)).filter(x=>x.v<0&&x.n!==XFER); }

function render() { renderTags(); renderMetrics(); renderTable(); renderSide(); renderCharts(); }

function renderTags() {
  const tl = document.getElementById('tagList');
  tl.innerHTML = '';
  tags.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tag' + (selTag===t?' sel':'') + (t===XFER?' transfer':'');
    el.textContent = t;
    el.onclick = () => { selTag = selTag===t?'':t; renderTags(); if(t!==XFER) document.getElementById('newTagInput').value=t; };
    tl.appendChild(el);
  });
}

function renderMetrics() {
  const f = filtered();
  const rs = realSpend();
  const bal = f.reduce((s,x)=>s+x.v,0);
  const inc = f.filter(x=>x.v>0).reduce((s,x)=>s+x.v,0);
  const out = f.filter(x=>x.v<0).reduce((s,x)=>s+Math.abs(x.v),0);
  const spend = rs.reduce((s,x)=>s+Math.abs(x.v),0);
  const cards = [
    {label:'账户余额',val:fmt(bal),cls:bal>=0?'pos':'neg',sub:'选定账户合计',glow:'#7c6ff7'},
    {label:'真实消费',val:'-$'+spend.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),cls:'neg',sub:'剔除账户互转',glow:'#f87171'},
    {label:'累计收入',val:'+$'+inc.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),cls:'pos',sub:'全部存入',glow:'#34d399'},
    {label:'累计支出',val:'-$'+out.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),cls:'neg',sub:'含互转',glow:'#fbbf24'},
  ];
  document.getElementById('metrics').innerHTML = cards.map(c=>`
    <div class="metric">
      <div class="metric-glow" style="background:${c.glow};"></div>
      <div class="metric-label">${c.label}</div>
      <div class="metric-val ${c.cls}">${c.val}</div>
      <div class="metric-sub">${c.sub}</div>
    </div>`).join('');
}

function renderTable() {
  const rows = filtered().slice().sort((a,b)=>b.d.localeCompare(a.d));
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(tx => {
    const gi = data.indexOf(tx);
    const tr = document.createElement('tr');
    tr.className = 'trow' + (tx.n===XFER?' xfer':'');
    const cls = tx.v>=0?'pos':'neg';
    tr.innerHTML = `<td>${tx.d}</td><td style="color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;">${tx.a}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${tx.desc}</td><td><span class="cat-chip">${tx.n||''}</span></td><td class="${cls}">${fmt(tx.v)}</td>`;
    tr.onclick = () => { if(confirm('删除这条记录？')) { data.splice(gi,1); save(); render(); } };
    tbody.appendChild(tr);
  });
  document.getElementById('tblTitle').textContent = `交易记录 (${rows.length} 笔，点击行删除)`;
}

function renderSide() {
  const accts = ['1221','1218','7808'];
  const names = {'1221':'Checking 1221','1218':'Savings 1218','7808':'Credit 7808'};
  let net = 0, html = '';
  accts.forEach(a => {
    const bal = data.filter(x=>x.a===a).reduce((s,x)=>s+x.v,0);
    net += bal;
    html += `<div class="acct-item"><span class="acct-name">${names[a]}</span><span class="acct-bal" style="color:${bal>=0?'var(--green)':'var(--red)'}">${fmt(bal)}</span></div>`;
  });
  document.getElementById('acctBals').innerHTML = html;
  const nb = document.getElementById('netBal');
  nb.textContent = fmt(net);
  nb.style.color = net>=0?'var(--green)':'var(--red)';
}

function renderCharts() {
  const rs = acc==='all'?data.filter(x=>x.v<0&&x.n!==XFER):data.filter(x=>x.a===acc&&x.v<0&&x.n!==XFER);
  
  // bar
  const months = {};
  rs.forEach(tx => { const m=tx.d.substring(0,7); months[m]=(months[m]||0)+Math.abs(tx.v); });
  const ml = Object.keys(months).sort();
  const mv = ml.map(m=>parseFloat(months[m].toFixed(2)));

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type:'bar',
    data:{labels:ml.map(m=>m.replace('2025-','').replace('2026-','26/')), datasets:[{label:'真实消费',data:mv,backgroundColor:'rgba(124,111,247,0.6)',borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+c.raw.toLocaleString('en-US',{minimumFractionDigits:2})}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#6b7280',autoSkip:false}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{font:{size:10},color:'#6b7280',callback:v=>'$'+v}}}}
  });

  // pie
  const cats = {};
  rs.forEach(tx => { cats[tx.n]=(cats[tx.n]||0)+Math.abs(tx.v); });
  const cl = Object.keys(cats).sort((a,b)=>cats[b]-cats[a]);
  const cv = cl.map(c=>parseFloat(cats[c].toFixed(2)));
  const total = cv.reduce((a,b)=>a+b,0);

  document.getElementById('pieLegend').innerHTML = cl.slice(0,6).map((l,i)=>`<div class="leg"><span class="leg-sq" style="background:${COLORS[i%COLORS.length]};"></span>${l}</div>`).join('');

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type:'doughnut',
    data:{labels:cl,datasets:[{data:cv,backgroundColor:COLORS.slice(0,cl.length),borderWidth:2,borderColor:'#16181c'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const pct=(c.raw/total*100).toFixed(1);return `$${c.raw.toLocaleString('en-US',{minimumFractionDigits:2})} (${pct}%)`}}}}}
  });
}

function addTag() {
  const t = document.getElementById('newTagInput').value.trim();
  if (!t || tags.includes(t)) return;
  tags.push(t); selTag=t;
  document.getElementById('newTagInput').value='';
  renderTags();
}

function addTx() {
  const d=document.getElementById('nDate').value;
  const a=document.getElementById('nAcc').value;
  const desc=document.getElementById('nDesc').value.trim();
  const v=parseFloat(document.getElementById('nAmt').value);
  if(!d||!desc||isNaN(v)){alert('请填写日期、描述和金额');return;}
  const n=selTag||document.getElementById('newTagInput').value.trim()||'未分类';
  if(!tags.includes(n))tags.push(n);
  data.push({d,a,desc,v,n});
  save(); render();
  document.getElementById('nDesc').value='';
  document.getElementById('nAmt').value='';
}

function exportCSV() {
  let csv='\uFEFF日期,账户,描述,金额,分类\n';
  data.forEach(x=>{csv+=`${x.d},${x.a},"${x.desc}",${x.v},${x.n}\n`;});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`账单备份_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

function importCSV(e) {
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const lines=ev.target.result.split('\n');
    const rows=[];
    for(let i=1;i<lines.length;i++){
      const c=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g);
      if(c&&c.length>=5)rows.push({d:c[0].trim(),a:c[1].trim(),desc:c[2].replace(/"/g,'').trim(),v:parseFloat(c[3]),n:c[4].trim()});
    }
    if(!rows.length){alert('未识别到数据');return;}
    if(confirm(`识别到 ${rows.length} 条，是否覆盖当前数据？`)){
      data=rows;
      tags=[...new Set(data.map(x=>x.n).filter(Boolean))];
      if(!tags.includes(XFER))tags.push(XFER);
      save(); render();
    }
  };
  r.readAsText(file,'utf-8');
}

document.getElementById('nDate').value=new Date().toISOString().split('T')[0];
render();
</script>
