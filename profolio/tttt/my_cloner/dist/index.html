><div class="group"><div class="group-horizontalFlexBlock"><label for="showControls">Show Points</label> <input type="checkbox" id="showControls" onchange="setShowControls(this.checked)"></div></div><div class="group"><div class="group-horizontalFlexBlock"><label for="showControlPoints">Show Control Points</label> <input type="checkbox" id="showControlPoints" onchange="setShowControlPoints(this.checked)"></div></div></fieldset><div id="info" aria-live="polite"></div></div><div class="buttons"><button id="tutorialButton">Tutorial</button> <button id="loadButton">Load Parameters from SVG</button> <input type="file" id="loadInput" accept=".svg" style="display:none"> <button id="saveButton" class="primary">Save SVG</button></div></div></div><script>let spacing = 8;
    let showControls = false;
    let showControlPoints = false;

    function generatePolygonSpiralPoints(centerX, centerY, numSides, tension, numPoints, sizeFactor, spacing) {
      const points = [];
      let radius = centerX * sizeFactor; // Distance from center to any vertex of the polygon
      const spiralRate = spacing / numSides; // Rate at which the spiral tightens
      const angleStep = (2 * Math.PI) / numSides; // Angle between each vertex of the polygon
      const rotationAngle = Math.PI / (numSides * (1 + tension)); // Math.PI / 4; // Rotate by 45 degrees
      let angle = rotationAngle;
      let i = 0;
      while (i < numPoints) {
        const x = centerX + radius * Math.cos(angle);
        const y = centerY + radius * Math.sin(angle);
        // points.push([x, y]);

        // Calculate the coordinates of the previous point on the spiral
        const prevX = centerX + (radius + spiralRate) * Math.cos(angle - angleStep);
        const prevY = centerY + (radius + spiralRate) * Math.sin(angle - angleStep);

        // Calculate control points based on the direction of the spiral
        const controlX1 = x + tension * (x - prevX);
        const controlY1 = y + tension * (y - prevY);

        // Calculate the coordinates of the next point on the spiral
        const nextX = centerX + (radius - spiralRate) * Math.cos(angle + angleStep);
        const nextY = centerY + (radius - spiralRate) * Math.sin(angle + angleStep);

        // Calculate control points based on the direction of the spiral
        const controlX2 = x + tension * (nextX - x);
        const controlY2 = y + tension * (nextY - y);

        // Push the coordinates for the rounded corner
        points.push([nextX, nextY, controlX1, controlY1, controlX2, controlY2]);

        angle += angleStep;
        // Decrease the radius based on the spiral rate for each point
        radius -= spiralRate;
        // Check if the point is close enough to the center to stop
        if (Math.sqrt(Math.pow(centerX - x, 2) + Math.pow(centerY - y, 2)) <= spiralRate * 2) {
          break;
        }
        i++;
      }
      return points;
    }

      metadata.textContent = JSON.stringify(Object.fromEntries(params.entries()));
      svgElement.insertBefore(metadata, svgElement.firstChild);

      const svgXml = new XMLSerializer().serializeToString(svgElement);

      const blob = new Blob([svgXml], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);

      const link = document.createElement('a');
      link.href = url;
      link.download = 'mySvg.svg';
      document.body.appendChild(link);
      link.click();

      URL.revokeObjectURL(url);
      // Remove metadata after saving to avoid duplicates on repeated saves
      svgElement.removeChild(metadata);
    });

        }

      // Reset the input so the same file can be loaded again if needed
      e.target.value = '';
    });
