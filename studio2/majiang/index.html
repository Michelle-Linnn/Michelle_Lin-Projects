<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahjong Project - Final Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Segoe UI", sans-serif; }
        .scene {
            position: relative;
            width: 100vw; height: 100vh;
            background-image: url('bg.png'); 
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .scene::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65); pointer-events: none; z-index: 1;
        }

        /* --- Text A: 禁区 (Forbidden Zone) --- */
        .glass-display {
            position: absolute; z-index: 100;
            width: 480px; height: 200px;
            background: rgba(0, 255, 204, 0.1);
            top: 44%; left: 25.1%; 
            transform: rotateX(-37deg) rotateZ(23deg) skewX(21deg);
            border-left: 3px solid #00ffcc;
            pointer-events: none;
        }
        .hud-text {
            color: #00ffcc; font-size: 19px; line-height: 1.4; font-weight: 700;
            padding: 20px; text-shadow: 0 0 15px rgba(0, 255, 204, 1);
            opacity: 0; transition: opacity 0.5s ease;
        }

        /* --- Text B: 碎片 --- */
        .scattered-fragment {
            position: absolute; z-index: 10;
            color: white; font-family: 'Permanent Marker', cursive; 
            pointer-events: none; white-space: nowrap; opacity: 0;
            text-shadow: 3px 3px 0px #000;
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .scattered-fragment.active { opacity: var(--op); transform: rotate(var(--r)) scale(1); }
    </style>
</head>
<body>

    <div class="scene" onclick="nextStep()">
        <div class="glass-display" id="hud-panel">
            <div id="rule-text" class="hud-text"></div>
        </div>
        <div id="fragments-container"></div>
    </div>

    <script>
        const rules = [
            "Chapter 1: The Opening\nEach player begins with 13 tiles. \nOrder is the only path to victory.",
            "Chapter 2: The Conflict\nDraw and discard. \nThis cycle continues until the wall is exhausted.",
            "Chapter 3: The Interruption\nThe Pung: Interrupting the natural flow. \nStealing your rhythm.",
            "Chapter 4: The Resolution\nThe Win (Hu): Perfect symmetry achieved. \nThe game terminates immediately."
        ];

        const fragmentsDictionary = [
            ["13 voids", "Chances to fail", "Fragile mask", "Chaos", "Order is a lie", "Empty hands", "Cold", "Fail", "Loss", "Anxiety", "Fear", "Structure", "Weight"],
            ["Exposed", "Cemetery", "Missed opportunities", "Discarding luck", "Sweating", "Crushing", "Every tile", "Discard pile", "Palm", "Sacrifice", "Crumbling", "Wall"],
            ["Heartbeat skipped", "Stole rhythm", "Intruder", "Cage", "Broken logic", "Screaming", "Theft", "Natural flow", "Pung!", "Triple", "Interrupted", "Logic", "Claim"],
            ["Silence falls", "Lost peace", "Shaking hands", "Crinkled", "Void", "Noise", "Symmetry", "Packed away", "Terminates", "Noise continues", "Final", "Done"]
        ];

        let currentIndex = 0;
        let placedRects = [];

        function nextStep() {
            const ruleEl = document.getElementById('rule-text');
            const container = document.getElementById('fragments-container');
            
            ruleEl.style.opacity = 0;
            container.innerHTML = '';
            placedRects = [];

            // 1. 将 Text A (HUD) 加入占位列表，防止重叠
            // 粗略估算 HUD 在屏幕上的平面投影位置
            placedRects.push({ x: window.innerWidth * 0.2, y: window.innerHeight * 0.4, w: 500, h: 250 });

            setTimeout(() => {
                ruleEl.textContent = rules[currentIndex];
                ruleEl.style.opacity = 1;

                const currentFrags = fragmentsDictionary[currentIndex];

                currentFrags.forEach((txt, i) => {
                    const frag = document.createElement('div');
                    frag.className = 'scattered-fragment';
                    frag.textContent = txt;
                    
                    // 设定字号层级
                    let fontSize = (i < 4) ? Math.floor(window.innerWidth / 15) : Math.floor(Math.random() * 20 + 28);
                    frag.style.fontSize = fontSize + 'px';
                    
                    // 预估碰撞体积 (宽: 字符数*字号*0.6, 高: 字号*1.2)
                    const w = txt.length * fontSize * 0.65;
                    const h = fontSize * 1.3;

                    let found = false;
                    let x, y, attempts = 0;

                    while (!found && attempts < 100) {
                        x = Math.random() * (window.innerWidth - w - 40) + 20;
                        y = Math.random() * (window.innerHeight - h - 40) + 20;

                        const newRect = { x, y, w, h };
                        
                        // 检查碰撞
                        const collision = placedRects.some(rect => {
                            return !(newRect.x + newRect.w < rect.x || 
                                     newRect.x > rect.x + rect.w || 
                                     newRect.y + newRect.h < rect.y || 
                                     newRect.y > rect.y + rect.h);
                        });

                        if (!collision) {
                            placedRects.push(newRect);
                            found = true;
                        }
                        attempts++;
                    }

                    if (found) {
                        const randomRot = Math.random() * 20 - 10;
                        const opacity = (i < 4) ? 0.9 : 0.5;

                        frag.style.left = x + 'px';
                        frag.style.top = y + 'px';
                        frag.style.setProperty('--r', `${randomRot}deg`);
                        frag.style.setProperty('--op', opacity);
                        
                        container.appendChild(frag);
                        setTimeout(() => frag.classList.add('active'), i * 30);
                    }
                });

                currentIndex = (currentIndex + 1) % rules.length;
            }, 300);
        }

        window.onload = nextStep;
    </script>
</body>
</html>
