<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHJONG_HUD - Chat App Glitch</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Segoe UI", sans-serif; cursor: pointer; }

        .chat-app-scene {
            position: relative;
            width: 100vw; height: 100vh;
            background-image: url('bg.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .chat-app-scene::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); pointer-events: none; z-index: 1;
        }

        #hud-rules-container {
            position: fixed; top: 20px; width: 90%; max-width: 600px;
            z-index: 100; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }

        .system-message {
            color: #00ffcc; font-size: 16px; font-weight: 700; line-height: 1.4;
            background: rgba(0, 255, 204, 0.08); border-left: 2px solid #00ffcc;
            padding: 10px 15px; margin-bottom: 10px; border-radius: 4px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
            opacity: 0; animation: systemFadeIn 0.5s ease forwards;
        }

        @keyframes systemFadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #fragments-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        .scattered-thought {
            position: absolute;
            color: rgba(255, 255, 255, var(--op));
            font-family: 'Permanent Marker', cursive;
            font-size: var(--s);
            pointer-events: none;
            white-space: nowrap;
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000;
            opacity: 0; filter: blur(3px);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            transform-origin: center center;
        }

        .scattered-thought.active {
            opacity: 1; filter: blur(0px);
            transform: translate(0, 0) rotate(var(--r)) scale(1);
        }

        .scattered-image {
            position: absolute;
            width: var(--img-size);
            height: var(--img-size);
            object-fit: contain;
            pointer-events: none;
            opacity: 0;
            filter: blur(6px);
            transform: scale(0.8) translateY(20px) rotate(var(--r));
            transform-origin: center center;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .scattered-image.active {
            opacity: var(--img-op);
            filter: blur(0px);
            transform: scale(1) translateY(0px) rotate(var(--r));
            animation: floatDrift var(--float-dur) ease-in-out infinite alternate;
        }

        @keyframes floatDrift {
            0%   { transform: scale(1) translateY(0px)   translateX(0px)  rotate(var(--r)); }
            33%  { transform: scale(1) translateY(-8px)  translateX(4px)  rotate(var(--r)); }
            66%  { transform: scale(1) translateY(5px)   translateX(-5px) rotate(var(--r)); }
            100% { transform: scale(1) translateY(-12px) translateX(6px)  rotate(var(--r)); }
        }

        @keyframes fadePulse {
            0%   { opacity: var(--img-op); }
            50%  { opacity: calc(var(--img-op) * 0.4); }
            100% { opacity: var(--img-op); }
        }

        .scattered-image.active.pulse {
            animation:
                floatDrift var(--float-dur) ease-in-out infinite alternate,
                fadePulse var(--pulse-dur) ease-in-out infinite;
        }

        .chat-app-scene.glitch { animation: fullSceneBlur 0.1s infinite; }
        @keyframes fullSceneBlur { 0% { filter: blur(0px); } 50% { filter: blur(2px); } 100% { filter: blur(0px); } }

        .hint {
            position: fixed; bottom: 25px; width: 100%; text-align: center;
            color: rgba(0, 255, 204, 0.3); font-size: 10px; letter-spacing: 4px; z-index: 110;
        }
    </style>
</head>
<body>

    <div class="chat-app-scene" id="scene" onclick="nextGlitchStep()">
        <div id="hud-rules-container"></div>
        <div id="fragments-container"></div>
        <div class="hint">CLICK TO SIMULATE博弈 / Notification Anxiety</div>
    </div>

    <script>
        const systemRules = [
            "System / Rules (Phase 1):\nThe Opening.\nOrder is the only path to victory.",
            "System / Rules (Phase 2):\nDraw and Discard.\nThe wall must be exhausted.",
            "System / Rules (Phase 3):\nThe Pung!\nStealing rhythm.",
            "System / Rules (Phase 4):\nThe Win (Hu).\nThe game terminates immediately."
        ];

        const fragmentsDictionary = [
            ["13 voids", "13 chances to fail", "Fragile mask", "Chaos in my chest", "Order is a lie", "Empty hands", "Fail", "Loss", "Anxiety", "Fear"],
            ["Exposed secrets", "Cemetery missed ops", "Discarding my luck?", "Sweating palm", "Luck?", "Every tile", "A secret", "opportunities", "Palm"],
            ["Heartbeat skipped", "I stole your rhythm", "Intruder!", "A cage for anxiety", "Broken logic", "Screaming inside", "Theft", "Logic", "My anxiety"],
            ["Silence falls", "I lost the peace", "Shaking hands", "Crinkled beyond repair", "Void", "Packing away", "Final", "Broken", "Done"]
        ];

        // 每个phase显示的文字数量：依次增多
        const textCountPerPhase = [5, 10, 20, 30];

        // 每个phase显示的图片数量：依次增多
        const imageCountPerPhase = [2, 4, 6, 9];

        const imagePool = Array.from({ length: 10 }, (_, i) => `Group ${14 + i}.png`);

        // 图片专用区域：四角 + 边缘，远离中心
        const imageZones = [
            { top: [2,  20], left: [2,  25]  },
            { top: [2,  20], left: [70, 90]  },
            { top: [72, 90], left: [2,  25]  },
            { top: [72, 90], left: [70, 90]  },
            { top: [28, 58], left: [2,  16]  },
            { top: [28, 58], left: [80, 92]  },
            { top: [2,  16], left: [38, 60]  },
            { top: [78, 92], left: [38, 60]  },
        ];

        // 文字专用区域：横向三列，纵向中段
        const textZones = [
            { top: [12, 78], left: [4,  28]  },
            { top: [12, 78], left: [33, 62]  },
            { top: [12, 78], left: [66, 90]  },
        ];

        let currentIndex = -1;
        let systemRuleCount = 0;
        let finished = false;
        const rulesContainer = document.getElementById('hud-rules-container');
        const fragContainer  = document.getElementById('fragments-container');
        const sceneEl        = document.getElementById('scene');

        function spawnImages(phaseIndex) {
            const count = imageCountPerPhase[phaseIndex];
            const shuffled = [...imagePool].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, count);
            const shuffledZones = [...imageZones].sort(() => 0.5 - Math.random());

            selected.forEach((src, i) => {
                const img = document.createElement('img');
                img.className = 'scattered-image';
                img.src = src;

                const zone = shuffledZones[i % shuffledZones.length];
                const top  = zone.top[0]  + Math.random() * (zone.top[1]  - zone.top[0]);
                const left = zone.left[0] + Math.random() * (zone.left[1] - zone.left[0]);

                const size     = 100 + Math.floor(Math.random() * 200);
                const rot      = (Math.random() * 50 - 25).toFixed(1);
                const op       = (0.55 + Math.random() * 0.4).toFixed(2);
                const floatDur = (2.5 + Math.random() * 2.5).toFixed(1) + 's';
                const pulseDur = (3   + Math.random() * 3).toFixed(1)   + 's';

                img.style.top  = top  + '%';
                img.style.left = left + '%';
                img.style.setProperty('--img-size',  size + 'px');
                img.style.setProperty('--r',         rot  + 'deg');
                img.style.setProperty('--img-op',    op);
                img.style.setProperty('--float-dur', floatDur);
                img.style.setProperty('--pulse-dur', pulseDur);

                if (Math.random() > 0.5) img.classList.add('pulse');
                fragContainer.appendChild(img);

                const delay = 80 + i * 100 + Math.random() * 150;
                setTimeout(() => img.classList.add('active'), delay);
            });
        }

        function nextGlitchStep() {
            if (finished) return;
            currentIndex += 1;
            if (currentIndex >= systemRules.length) {
                finished = true;
                document.querySelector('.hint').textContent = '— GAME OVER —';
                return;
            }
            fragContainer.innerHTML = '';

            const systemMsg = document.createElement('div');
            systemMsg.className = 'system-message';
            systemMsg.textContent = systemRules[currentIndex];
            rulesContainer.appendChild(systemMsg);
            if (rulesContainer.children.length > 3) {
                rulesContainer.removeChild(rulesContainer.firstChild);
            }
            systemRuleCount++;

            const currentFrags = fragmentsDictionary[currentIndex];
            const targetCount = textCountPerPhase[currentIndex];

            // 循环复制词库直到满足数量，再打乱
            let pool = [];
            while (pool.length < targetCount) {
                pool = pool.concat([...currentFrags]);
            }
            pool = pool.slice(0, targetCount).sort(() => 0.5 - Math.random());

            // 文字区域打散分配
            const shuffledTextZones = [...textZones].sort(() => 0.5 - Math.random());

            pool.forEach((txt, i) => {
                const frag = document.createElement('div');
                frag.className = 'scattered-thought';
                frag.textContent = txt;

                const zone = shuffledTextZones[i % shuffledTextZones.length];
                const top  = zone.top[0]  + Math.random() * (zone.top[1]  - zone.top[0]);
                const left = zone.left[0] + Math.random() * (zone.left[1] - zone.left[0]);

                let randomSize;
                if (i < 3) {
                    randomSize = 60 + Math.random() * 60;
                } else {
                    randomSize = 14 + Math.random() * 36;
                }

                const randomRot   = Math.random() * 60 - 30;
                const randomAlpha = 0.5 + Math.random() * 0.5;

                frag.style.top  = top  + '%';
                frag.style.left = left + '%';
                frag.style.setProperty('--r',  `${randomRot}deg`);
                frag.style.setProperty('--s',  `${randomSize}px`);
                frag.style.setProperty('--op', randomAlpha);
                frag.style.transform = `scale(0.8) translateY(30px)`;

                fragContainer.appendChild(frag);
                setTimeout(() => frag.classList.add('active'), i * 60);
            });

            spawnImages(currentIndex);

            if (fragContainer.children.length > 20) {
                sceneEl.classList.add('glitch');
                setTimeout(() => sceneEl.classList.remove('glitch'), 500);
            }
        }

        window.onload = () => {
            document.querySelector('.hint').textContent = 'CLICK TO BEGIN / 点击开始';
        };
    </script>
</body>
</html>
