<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch Driver Picker</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --bg-dark: #050505;
            --accent-pink: #ff00ff;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            border: 3px solid var(--neon-green);
            padding: 40px;
            /* 延续你喜欢的圆角风格 / Your preferred rounded style */
            border-radius: 25px;
            box-shadow: 0 0 15px var(--neon-green);
            background: rgba(0, 255, 65, 0.05);
        }

        #display {
            font-size: 2.5rem;
            margin: 30px 0;
            height: 60px;
            color: var(--accent-pink);
            text-shadow: 0 0 10px var(--accent-pink);
        }

        button {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #008f24;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #008f24;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 1rem; letter-spacing: 2px;">LUNCH SELECTOR v2.0</div>
        <div id="display">READY?</div>
        <button onclick="pickLunch()">开始派单 (START)</button>
        <div class="hint">按 Enter 或 点击按钮随机抽取</div>
    </div>

    <script>
        const menu = [
            "黄焖鸡米饭 (HP +50)",
            "兰州拉面 (速度 +10)",
            "路边摊炒粉 (顺路首选)",
            "便利店饭团 (赶单神器)",
            "猪脚饭 (能量补满)",
            "萨莉亚 (性价比之王)",
            "麦当劳 (全城有店)",
            "回家吃 (亲情 Buff)"
        ];

        let isSpinning = false;

        function pickLunch() {
            if (isSpinning) return;
            isSpinning = true;
            
            const display = document.getElementById('display');
            let counter = 0;
            const duration = 20; // 闪烁次数
            
            const interval = setInterval(() => {
                display.innerText = menu[Math.floor(Math.random() * menu.length)];
                counter++;
                
                if (counter > duration) {
                    clearInterval(interval);
                    isSpinning = false;
                    display.style.color = "#00ff41"; // 最终选定变绿色
                    setTimeout(() => { display.style.color = "#ff00ff"; }, 1000);
                }
            }, 80);
        }

        // 监听回车键 (Listen for Enter key)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') pickLunch();
        });
    </script>
</body>
</html>
