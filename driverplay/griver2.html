<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver's Soul Fuel</title>
    <style>
        :root {
            --road-yellow: #ffcc00;
            --night-blue: #0a0e14;
            --soft-text: #b0b8c4;
        }

        body {
            background-color: var(--night-blue);
            color: var(--soft-text);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 呼吸灯背景效果 / Breathing background effect */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 204, 0, 0.05) 0%, transparent 70%);
            animation: breathe 4s infinite ease-in-out;
            z-index: -1;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .main-card {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 204, 0, 0.2);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--road-yellow);
            margin-bottom: 30px;
            opacity: 0.8;
        }

        #food-slot {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
            margin: 30px 0;
            min-height: 2.5rem;
            transition: all 0.3s;
        }

        #quote-area {
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 40px;
            min-height: 100px;
            color: #d1d9e6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn {
            background: transparent;
            color: var(--road-yellow);
            border: 2px solid var(--road-yellow);
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:active {
            background: var(--road-yellow);
            color: #000;
        }

        .icon { font-size: 2rem; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="main-card">
        <span class="title">今日能量导航 // GPS FOR SOUL</span>
        <span class="icon">🍱</span>
        <div id="food-slot">这一单，送给自己</div>
        <div id="quote-area">无论路有多远，总有一盏灯在为你等候。先停下来，好好吃顿饭吧。</div>
        <button class="action-btn" onclick="startNavigation()">随机生成午餐指令</button>
    </div>

    <script>
        const foodPool = [
            "砂锅土豆粉 (热腾腾的宽慰)", "广式烧腊饭 (甜甜的动力)", "新疆炒米粉 (火辣的激情)", 
            "老北京炸酱面 (踏实的滋味)", "日式肥牛饭 (温润的能量)", "便利店全家桶 (高效的补给)",
            "肯德基疯狂星期四 (快乐的犒赏)", "路边大排档小炒 (烟火气的自由)", "手工大水饺 (家的感觉)",
            "萨莉亚全餐 (自由的组合)", "街头铁板鱿鱼面 (奔波的奖励)", "养生排骨汤饭 (温柔的呵护)"
        ];

        const soulPool = [
            "这世界很嘈杂，但此刻这顿饭的时间只属于你。辛苦了，你是最棒的摆渡人。",
            "握了几个小时方向盘，手指累了吧？放下手机，看会儿窗外的树，慢慢吃。",
            "每一单安全送达的背后，都是你的责任感。你是这座城市默默运行的英雄。",
            "偶尔没接到单也没关系，那是因为老天想让你多休息一会，去吃顿好的吧。",
            "不必总是那么匆忙，马路上的红绿灯在提醒我们要学会等待，生活也是。",
            "你是家人的顶梁柱，也是乘客的守护神。好好吃饭，就是对未来最好的投资。",
            "刚才那个没礼貌的乘客已经远去了，别让他的错误惩罚你的心情，开心点！",
            "看，今天的阳光/月色很美，它也在陪着你跑车。给自己加个鸡腿吧！",
            "这一路你照顾了很多人，现在轮到我们（还有美食）来照顾你了。"
        ];

        let rolling = false;

        function startNavigation() {
            if (rolling) return;
            rolling = true;
            
            const foodEl = document.getElementById('food-slot');
            const quoteEl = document.getElementById('quote-area');
            const btn = document.querySelector('.action-btn');
            
            btn.innerText = "正在定位美食...";
            quoteEl.style.opacity = 0.3;

            let i = 0;
            const timer = setInterval(() => {
                foodEl.innerText = foodPool[Math.floor(Math.random() * foodPool.length)];
                i++;
                if (i > 15) {
                    clearInterval(timer);
                    rolling = false;
                    btn.innerText = "重新定位";
                    quoteEl.innerText = soulPool[Math.floor(Math.random() * soulPool.length)];
                    quoteEl.style.opacity = 1;
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                }
            }, 80);
        }
    </script>
</body>
</html>
