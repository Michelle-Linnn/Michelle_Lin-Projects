<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>暗号高级编辑器 - 透明PNG版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --panel-bg: #2c3e50; 
            --accent: #3498db; 
            --glyph-size: 50px;
            --char-spacing: 10px;
            --color-filter: none;
        }
        
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }

        /* 工具栏 */
        .toolbar { 
            width: 100%; background: var(--panel-bg); padding: 15px; 
            position: sticky; top: 0; z-index: 100; display: flex; 
            flex-wrap: wrap; justify-content: center; gap: 20px;
        }
        .tool-group { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
        
        /* 纸张预览：默认浅色格子背景方便对齐，但导出时会设为透明 */
        #paper { 
            background-color: white; 
            background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 500px; width: 80%; 
            margin: 30px; padding: 50px; 
            display: flex; flex-wrap: wrap; align-content: flex-start;
            gap: var(--char-spacing);
            transition: background 0.3s;
        }

        /* 符号样式 */
        .glyph { 
            height: var(--glyph-size); 
            width: auto; 
            filter: var(--color-filter);
            mix-blend-mode: multiply; /* 如果图片是白底黑字，这很有用 */
        }
        
        /* 模拟光标 */
        #cursor {
            width: 3px;
            height: var(--glyph-size);
            background-color: var(--accent);
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0; } 
        }

        .space { width: 30px; }
        .line-break { width: 100%; height: 10px; }

        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; background: var(--accent); color: white; }
        .export-btn { background: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <label>风格: <select id="styleSelect" onchange="currentStyle = this.value">
                <option value="style1">风格一</option>
                <option value="style2">风格二</option>
            </select></label>
        </div>
        <div class="tool-group">
            <label>大小: <input type="range" min="20" max="150" value="50" oninput="updateStyle('--glyph-size', this.value + 'px')"></label>
        </div>
        <div class="tool-group">
            <label>间距: <input type="range" min="0" max="50" value="10" oninput="updateStyle('--char-spacing', this.value + 'px')"></label>
        </div>
        <div class="tool-group">
            <label>颜色 (Hue): <input type="range" min="0" max="360" value="0" oninput="updateColor(this.value)"></label>
        </div>
        <div class="tool-group" style="flex-direction: row; align-items: center; padding-top: 15px;">
            <button class="export-btn" onclick="exportPNG()">导出透明 PNG</button>
            <button onclick="clearPaper()" style="background:#c0392b; margin-left:10px;">清空</button>
        </div>
    </div>

    <div id="paper">
        <div id="cursor"></div>
    </div>

    <script>
        const paper = document.getElementById('paper');
        const cursor = document.getElementById('cursor');
        let currentStyle = 'style1';

        // 键盘输入逻辑
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            const key = e.key.toLowerCase();

            if (/^[a-z]$/.test(key)) {
                const img = document.createElement('img');
                img.src = `${currentStyle}/${key}.png`; 
                img.className = 'glyph';
                paper.insertBefore(img, cursor); // 始终在光标前插入
            } 
            else if (e.key === ' ') {
                const space = document.createElement('div');
                space.className = 'space';
                paper.insertBefore(space, cursor);
            }
            else if (e.key === 'Enter') {
                const br = document.createElement('div');
                br.className = 'line-break';
                paper.insertBefore(br, cursor);
            }
            else if (e.key === 'Backspace') {
                const prev = cursor.previousSibling;
                if (prev) paper.removeChild(prev);
            }
            
            // 自动滚动到光标位置
            cursor.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        function updateStyle(prop, val) {
            document.documentElement.style.setProperty(prop, val);
            if(prop === '--glyph-size') cursor.style.height = val;
        }

        function updateColor(hue) {
            const filterStr = hue == 0 ? 'none' : `sepia(1) saturate(100) hue-rotate(${hue}deg)`;
            document.documentElement.style.setProperty('--color-filter', filterStr);
        }

        // 导出透明 PNG 核心逻辑
        async function exportPNG() {
            // 1. 临时移除背景和光标
            const originalBG = paper.style.background;
            paper.style.background = 'none';
            paper.style.backgroundColor = 'transparent';
            cursor.style.display = 'none';

            // 2. 使用 html2canvas 渲染
            const canvas = await html2canvas(paper, {
                backgroundColor: null, // 关键：设置为 null 导出透明背景
                useCORS: true,
                scale: 2 // 提高清晰度
            });

            // 3. 恢复显示
            paper.style.background = originalBG;
            cursor.style.display = 'block';

            // 4. 下载图片
            const link = document.createElement('a');
            link.download = `secret-symbols-${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        function clearPaper() {
            if(confirm('清空所有内容？')) {
                const glyphs = paper.querySelectorAll('.glyph, .space, .line-break');
                glyphs.forEach(el => el.remove());
            }
        }
    </script>
</body>
</html>
