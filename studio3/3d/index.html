<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelle - Studio 2: Catalog of Parts (Three.js)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        
        /* 界面 UI 样式 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none; /* 让鼠标事件穿透 UI 层传递给 Canvas */
        }
        h1 { font-size: 18px; font-weight: normal; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px;}
        .description { font-size: 12px; opacity: 0.7; max-width: 300px; line-height: 1.5; }
        .label {
            position: absolute;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Catalog of Parts</h1>
        <div class="description">
            effect
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 全局变量 ---
        let scene, camera, renderer, controls;
        let group; // 用于存放所有部件的组
        let mouse = new THREE.Vector2();
        let targetRotation = new THREE.Vector2();

        // --- 初始化 ---
        init();
        animate();

        function init() {
            // 1. 场景设置
            scene = new THREE.Scene();
            // 雾效果，增加空间感
            scene.fog = new THREE.FogExp2(0x050505, 0.05);

            // 2. 相机设置
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 2, 12);

            // 3. 渲染器设置
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 优化移动端性能
            document.body.appendChild(renderer.domElement);

            // 4. 控制器 (允许鼠标拖拽查看)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // 增加阻尼感，更平滑
            controls.enablePan = false; // 禁用平移
            controls.minDistance = 5;
            controls.maxDistance = 20;

            // 5. 灯光
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x00ffff, 10, 50);
            pointLight.position.set(-10, -10, -10);
            scene.add(pointLight);

            // 6. 生成部件目录
            group = new THREE.Group();
            createCatalog(group);
            scene.add(group);

            // 7. 辅助平面 (可选)
            // const gridHelper = new THREE.GridHelper( 30, 30, 0x222222, 0x111111 );
            // gridHelper.position.y = -6;
            // scene.add( gridHelper );

            // 事件监听
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
        }

        // --- 核心逻辑：生成部件目录阵列 ---
        function createCatalog(parentGroup) {
            const spacing = 4; // 部件之间的间隔
            const rows = 3;    // 三个逻辑类别 (Input, Process, Output)
            const cols = 5;    // 五个形态演变版本

            // 颜色方案：从青色到紫色的渐变
            const colorStart = new THREE.Color(0x00ffff);
            const colorEnd = new THREE.Color(0xff00ff);

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    let geometry;
                    const iterationPrc = j / (cols - 1); // 当前是第几个演变的百分比 (0.0 - 1.0)

                    // --- 维度 1: 几何形态演变 (行) ---
                    if (i === 0) {
                        // 行 1: Triggers / Inputs (规则触发)
                        // 演变：圆环变粗，管径增加
                        geometry = new THREE.TorusGeometry(1, 0.1 + (iterationPrc * 0.4), 12, 100);
                    } else if (i === 1) {
                        // 行 2: Logic Processors (逻辑处理)
                        // 演变：立方体细分增加，准备进行复杂变形
                        const detail = 1 + Math.floor(iterationPrc * 5);
                        geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5, detail, detail, detail);
                    } else {
                        // 行 3: Outputs / Feedback (结果输出)
                        // 演变：多面体变得更加平滑和复杂
                        const detail = Math.floor(iterationPrc * 3);
                        geometry = new THREE.IcosahedronGeometry(1.2, detail);
                    }

                    // --- 维度 2: 材质多样性 (列) ---
                    // 计算渐变色
                    const materialColor = colorStart.clone().lerp(colorEnd, iterationPrc);
                    
                    // 交替使用实体材质和线框材质，增加视觉多样性
                    const isWireframe = (j % 2 === 0);

                    const material = new THREE.MeshPhongMaterial({
                        color: materialColor,
                        wireframe: isWireframe,
                        transparent: true,
                        opacity: isWireframe ? 0.4 : 0.8,
                        shininess: 100,
                        side: THREE.DoubleSide
                    });

                    const mesh = new THREE.Mesh(geometry, material);

                    // --- 维度 3: 空间布局 (阵列) ---
                    // 将组中心化：(j - (cols-1)/2) * spacing
                    const posX = (j - (cols - 1) / 2) * spacing;
                    const posY = -(i - (rows - 1) / 2) * spacing;
                    mesh.position.set(posX, posY, 0);

                    // 为每个部件添加自定义属性，用于动画
                    mesh.userData = {
                        originalY: posY,
                        phase: Math.random() * Math.PI * 2, // 随机初始相位
                        type: i
                    };

                    parentGroup.add(mesh);
                }
            }
        }

        // --- 交互与动画 ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            // 将鼠标坐标标准化为 -1 到 +1
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function animate() {
            requestAnimationFrame(animate);

            // 1. 更新 OrbitControls
            controls.update();

            // 2. 场景自动旋转 (轻微)
            targetRotation.x += (mouse.x * 0.1 - targetRotation.x) * 0.05;
            targetRotation.y += (mouse.y * 0.1 - targetRotation.y) * 0.05;
            group.rotation.y = targetRotation.x;
            group.rotation.x = -targetRotation.y;

            // 3. 这里的关键：让每个部件进行独立的参数化动画
            const time = performance.now() * 0.001; // 获取当前时间（秒）

            group.children.forEach((mesh) => {
                // 所有人都在旋转
                mesh.rotation.x += 0.005;
                mesh.rotation.y += 0.01;

                // 根据行类别（Triggers, Process, Outputs）应用不同的动态变形
                if (mesh.userData.type === 0) {
                    // 行 1 (圆环): 像脉搏一样呼吸缩放
                    const scale = 1 + Math.sin(time * 2 + mesh.userData.phase) * 0.1;
                    mesh.scale.set(scale, scale, scale);
                } else if (mesh.userData.type === 1) {
                    // 行 2 (立方体): 上下轻微漂浮
                    mesh.position.y = mesh.userData.originalY + Math.sin(time + mesh.userData.phase) * 0.3;
                } else if (mesh.userData.type === 2) {
                    // 行 3 (多面体): 材质透明度闪烁
                    mesh.material.opacity = 0.5 + Math.sin(time * 4 + mesh.userData.phase) * 0.3;
                }
            });

            renderer.render(scene, camera);
        }

    </script>
</body>
</html>
