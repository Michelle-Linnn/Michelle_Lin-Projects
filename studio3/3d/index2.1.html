<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelle - Studio 2: Vast Luminous Space</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            pointer-events: none; z-index: 10;
        }
        h1 { font-size: 22px; font-weight: normal; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 3px; color: #00ffff; text-shadow: 0 0 10px #00ffff; }
        .description { font-size: 12px; opacity: 0.8; max-width: 400px; line-height: 1.6; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Catalog of Parts: The Luminous Void</h1>
        <div class="description">
            square
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, group;
        let cubeSize = 100; // 显著增大的空间尺寸

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            // 降低雾气浓度，让空间更通透
            scene.fog = new THREE.FogExp2(0x000000, 0.005);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(80, 60, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true; // 开启自动旋转增加动态感
            controls.autoRotateSpeed = 0.5;

            // --- 增强灯光系统 ---
            // 提升全局基础亮度
            const ambient = new THREE.AmbientLight(0xffffff, 1.2); 
            scene.add(ambient);

            // 多个方位的点光源，模拟明亮的室内感
            const lightPositions = [
                [50, 50, 50], [-50, 50, -50], [50, -50, -50], [-50, -50, 50]
            ];
            lightPositions.forEach(pos => {
                const pLight = new THREE.PointLight(0x00ffff, 100, 300);
                pLight.position.set(...pos);
                scene.add(pLight);
            });

            // --- 1. 创建巨大的发光透明四方体 ---
            createContainer();

            // --- 2. 创建随机散落的几何体 ---
            group = new THREE.Group();
            createScatteredParts(group, 60); // 增加数量以适应大空间
            scene.add(group);

            window.addEventListener('resize', onWindowResize);
        }

        function createContainer() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,1024,1024);
            
            // 绘制加密字体，线条更亮
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2;
            for(let i=0; i<120; i++) {
                let x = Math.random()*1024, y = Math.random()*1024, s = 40;
                ctx.beginPath(); ctx.moveTo(x, y-s); ctx.lineTo(x, y+s); ctx.stroke();
                if(Math.random() > 0.5) ctx.strokeRect(x-10, y-10, 20, 20);
                else { ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.stroke(); }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(3, 3);

            // 显著提升透明度和发光感
            const wallMat = new THREE.MeshPhongMaterial({
                map: texture,
                color: 0x222222,
                emissive: 0x00ffff,
                emissiveIntensity: 0.4, // 增加墙面自发光
                side: THREE.BackSide,
                transparent: true,
                opacity: 0.35, // 提高可见度
                shininess: 100
            });

            const boxGeom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
            const container = new THREE.Mesh(boxGeom, wallMat);
            scene.add(container);

            // 强化边框线
            const edges = new THREE.EdgesGeometry(boxGeom);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff, opacity: 0.6, transparent: true }));
            scene.add(line);
        }

        function createScatteredParts(parentGroup, count) {
            const geometries = [
                (s) => new THREE.TorusGeometry(s, s*0.3, 16, 100),
                (s) => new THREE.BoxGeometry(s*1.8, s*1.8, s*1.8),
                (s) => new THREE.IcosahedronGeometry(s*1.5, 1),
                (s) => new THREE.OctahedronGeometry(s*1.5, 0) // 增加一种几何体
            ];

            for (let i = 0; i < count; i++) {
                const baseSize = 1.0 + Math.random() * 4.0; // 增大部件尺寸上限
                const type = Math.floor(Math.random() * geometries.length);
                const geom = geometries[type](baseSize);

                const color = new THREE.Color().setHSL(0.5 + Math.random() * 0.1, 0.9, 0.7);
                const mat = new THREE.MeshPhongMaterial({
                    color: color,
                    wireframe: Math.random() > 0.4,
                    transparent: true,
                    opacity: 0.85,
                    emissive: color,
                    emissiveIntensity: 0.5, // 让物体本身更亮
                    shininess: 100
                });

                const mesh = new THREE.Mesh(geom, mat);

                // 在 100x100x100 的空间内散落
                const range = cubeSize / 2 - 10;
                mesh.position.set(
                    (Math.random() - 0.5) * range * 2,
                    (Math.random() - 0.5) * range * 2,
                    (Math.random() - 0.5) * range * 2
                );

                mesh.userData = {
                    originalPos: mesh.position.clone(),
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.3 + Math.random() * 1.2
                };

                parentGroup.add(mesh);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = performance.now() * 0.001;

            group.children.forEach((mesh) => {
                const p = mesh.userData;
                // 呼吸效果更平滑
                const s = 1 + Math.sin(time * p.speed + p.phase) * 0.25;
                mesh.scale.set(s, s, s);

                // 漂浮范围增大
                mesh.position.y = p.originalPos.y + Math.sin(time * 0.4 + p.phase) * 4.0;
                mesh.position.x = p.originalPos.x + Math.cos(time * 0.2 + p.phase) * 2.0;

                mesh.rotation.x += 0.008;
                mesh.rotation.z += 0.004;
            });

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
