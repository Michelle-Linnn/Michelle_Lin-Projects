<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelle - Studio 2: Scattered Rule Space</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            pointer-events: none; z-index: 10;
        }
        h1 { font-size: 18px; font-weight: normal; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; color: #00ffff; }
        .description { font-size: 11px; opacity: 0.6; max-width: 300px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Catalog of Parts: The Scattered Void</h1>
        <div class="description">
        square
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, group;
        let cubeSize = 30; // 空间盒子的大小

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 20, 35);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // --- 灯光 ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);

            const pointLight = new THREE.PointLight(0x00ffff, 50, 100);
            pointLight.position.set(0, 15, 0);
            scene.add(pointLight);

            // --- 1. 创建透明的四方体空间 (The Container) ---
            createContainer();

            // --- 2. 创建随机散落的几何体 ---
            group = new THREE.Group();
            createScatteredParts(group, 40); // 生成 40 个随机部件
            scene.add(group);

            window.addEventListener('resize', onWindowResize);
        }

        function createContainer() {
            // 墙面贴图：加密字体
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,1024,1024);
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 1;
            for(let i=0; i<80; i++) {
                let x = Math.random()*1024, y = Math.random()*1024, s = 30;
                ctx.beginPath(); ctx.moveTo(x, y-s); ctx.lineTo(x, y+s); ctx.stroke();
                ctx.strokeRect(x-5, y-5, 10, 10);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2);

            // 透明外壳材质
            const wallMat = new THREE.MeshPhongMaterial({
                map: texture,
                color: 0x111111,
                emissive: 0x00ffff,
                emissiveIntensity: 0.1,
                side: THREE.BackSide,
                transparent: true,
                opacity: 0.2, // 透明感
                shininess: 100
            });

            const boxGeom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
            const container = new THREE.Mesh(boxGeom, wallMat);
            scene.add(container);

            // 添加外框线，强化“立方体”的感觉
            const edges = new THREE.EdgesGeometry(boxGeom);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff, opacity: 0.3, transparent: true }));
            scene.add(line);
        }

        function createScatteredParts(parentGroup, count) {
            const geometries = [
                (s) => new THREE.TorusGeometry(s, s*0.3, 16, 100),
                (s) => new THREE.BoxGeometry(s*1.5, s*1.5, s*1.5),
                (s) => new THREE.IcosahedronGeometry(s*1.2, 1)
            ];

            for (let i = 0; i < count; i++) {
                const baseSize = 0.5 + Math.random() * 2.0; // 随机基础大小
                const type = Math.floor(Math.random() * geometries.length);
                const geom = geometries[type](baseSize);

                const color = new THREE.Color().setHSL(0.5 + Math.random() * 0.2, 0.8, 0.6);
                const mat = new THREE.MeshPhongMaterial({
                    color: color,
                    wireframe: Math.random() > 0.5,
                    transparent: true,
                    opacity: 0.7,
                    emissive: color,
                    emissiveIntensity: 0.2
                });

                const mesh = new THREE.Mesh(geom, mat);

                // 随机分布在立方体内部 (保留一点边缘余量)
                const range = cubeSize / 2 - 4;
                mesh.position.set(
                    (Math.random() - 0.5) * range * 2,
                    (Math.random() - 0.5) * range * 2,
                    (Math.random() - 0.5) * range * 2
                );

                mesh.userData = {
                    originalPos: mesh.position.clone(),
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.5 + Math.random() * 1.5
                };

                parentGroup.add(mesh);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = performance.now() * 0.001;

            group.children.forEach((mesh) => {
                const p = mesh.userData;
                // 1. 呼吸 (Scaling)
                const s = 1 + Math.sin(time * p.speed + p.phase) * 0.2;
                mesh.scale.set(s, s, s);

                // 2. 漂浮 (Floating)
                mesh.position.y = p.originalPos.y + Math.sin(time * 0.5 + p.phase) * 1.5;
                mesh.position.x = p.originalPos.x + Math.cos(time * 0.3 + p.phase) * 1.0;

                // 3. 自转
                mesh.rotation.x += 0.01;
                mesh.rotation.z += 0.005;
            });

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
