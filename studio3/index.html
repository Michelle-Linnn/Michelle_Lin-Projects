<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SUNSET - Multi-Trigger System</title>
    <style>
        :root { --radius: 180px; }
        body, html { margin: 0; padding: 0; background-color: #050505; overflow-x: hidden; }
        
        /* 1. 左上角标题 (Brand) */
        .brand-header {
            position: fixed;
            top: 40px;
            left: 50px;
            z-index: 1000; 
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none; 
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .brand-header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .brand-header p {
            margin: 4px 0 0 2px;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        /* 2. 右上角提示语 (Explore Hint) */
        .explore-hint {
            position: fixed;
            top: 45px;
            right: 50px;
            z-index: 1000;
            color: rgba(255, 255, 255, 0.5);
            font-family: "Segoe UI", sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        /* 3. 背景及遮罩逻辑 */
        .image-list { position: relative; width: 100%; }
        .image-list img.bg-img { width: 100vw; height: auto; display: block; object-fit: cover; }

        #fog {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 15, 25, 0.78); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            pointer-events: none; z-index: 100;
        }

        /* 4. 视角图片容器 */
        .shijiao-container {
            position: absolute;
            right: 4%;         
            z-index: 150;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
            max-width: 45vw;
        }

        .line {
            width: 2px;
            height: 0;
            background: linear-gradient(to bottom, rgba(255, 204, 100, 0.8), transparent);
            transition: height 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .shijiao-img {
            width: auto;
            max-width: 380px;
            max-height: 70vh;
            object-fit: contain;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 204, 100, 0.4);
            box-shadow: 0 15px 45px rgba(0,0,0,0.9);
        }

        /* 激活状态 */
        .shijiao-container.active { opacity: 1; transform: translateY(0); }
        .shijiao-container.active .line { height: 80px; }

        #debug { position: fixed; bottom: 10px; right: 10px; color: rgba(255,255,255,0.05); font-size: 10px; z-index: 1000; }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1>Overall space</h1>
        <p>Three-layer Rubik's Cube structure</p>
    </div>

    <div class="explore-hint">
        Let's explore with our flashlights!
    </div>

    <div id="debug">ABS X: <span id="curX">0</span> | ABS Y: <span id="curY">0</span></div>

    <div class="image-list" id="main-container">
        <img src="1.png" class="bg-img">
        <img src="2.png" class="bg-img">
        <img src="3.png" class="bg-img">
        <img src="4.png" class="bg-img">
        <img src="5.png" class="bg-img">
    </div>

    <div id="fog"></div>

    <script>
        const triggerPoints = [
            { id: 'sh1', x: 537, y: 1274, img: 'shijiao1.png' },
            { id: 'sh2', x: 276, y: 1757, img: 'shijiao2.png' },
            { id: 'sh3', x: 519, y: 1094, img: 'shijiao3.png' },
            { id: 'sh4', x: 518, y: 578,  img: 'shijiao4.png' },
            { id: 'sh5', x: 380, y: 990,  img: 'shijiao5.png' }
        ];

        const container = document.getElementById('main-container');
        const fog = document.getElementById('fog');
        const curXDisp = document.getElementById('curX');
        const curYDisp = document.getElementById('curY');

        const elements = triggerPoints.map(point => {
            const div = document.createElement('div');
            div.className = 'shijiao-container';
            div.style.top = (point.y - 100) + 'px'; 
            div.innerHTML = `<div class="line"></div><img src="${point.img}" class="shijiao-img">`;
            container.appendChild(div);
            return { ...point, el: div };
        });

        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let currentX = mouseX, currentY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
        });

        function animate() {
            currentX += (mouseX - currentX) * 0.12;
            currentY += (mouseY - currentY) * 0.12;

            const absX = currentX + window.scrollX;
            const absY = currentY + window.scrollY;

            // 更新手电筒遮罩
            const mask = `radial-gradient(circle 180px at ${currentX}px ${currentY}px, transparent 90%, black 100%)`;
            fog.style.webkitMaskImage = mask;
            fog.style.maskImage = mask;

            // 检测触发
            elements.forEach(item => {
                const dist = Math.sqrt(Math.pow(absX - item.x, 2) + Math.pow(absY - item.y, 2));
                if (dist < 100) { 
                    item.el.classList.add('active');
                } else {
                    item.el.classList.remove('active');
                }
            });

            curXDisp.innerText = Math.floor(absX);
            curYDisp.innerText = Math.floor(absY);
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
